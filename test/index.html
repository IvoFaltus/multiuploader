<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="deepweb.css" />
  </head>
  <body class="indexBody">
    <header class="header1">
      <div class="navbarD">
        <button class="btnD btnD1">Guide</button>
        <button class="btnD btnD2">Statistics</button>
        <button class="btnD btnD3">Settings</button>
        <button class="btnD btnD4">Profile</button>
      </div>
    </header>

    <div class="main">
      <div class="optionsD">
        <input type="text" class="searchListing" placeholder="Search">


        <div class="subOptions">
          <div class="optionD optionD0">

            <h1 class="optionTitleD">Display</h1>
            <p>All<input type="checkbox"></p>
            <p>By Platform<input type="checkbox"></p>
            <p>Only Bazoš<input type="checkbox"></p>
            <p>Only Sbazar<input type="checkbox"></p>
            <p>Only Aukro<input type="checkbox"></p>

            
          </div>
          <div class="optionD optionD1">
            <h1 class="optionTitleD">Sort By</h1>
            <p>Price (Low to High) <input type="checkbox"></p>
            <p>Price (High to Low)<input type="checkbox"></p>
            <p>Most Recent<input type="checkbox"></p>
            <p>Oldest First<input type="checkbox"></p>
          </div>
          <div class="optionD optionD2">

            <button class="addListingBtn aBtn">Add Listing</button>
            <button class="removeListingBtn aBtn">Remove Listing</button>
          </div>
          <div class="optionD optionD3">
            <h1>Options</h1>
          </div>
        </div>
      </div>

      <div class="listingsDiv">
        <div class="allListings"></div>



      </div>
    </div>
