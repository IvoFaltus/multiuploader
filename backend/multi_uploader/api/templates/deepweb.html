<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeepWeb</title>
    <style>
        li{
            list-style-type: none;
        }
        body {
            background: #0a0a0a;
            color: #0fda88;
            font-family: Consolas, monospace;
            text-align: center;
            padding-top: 80px;
        }
        .box {
            border: 1px solid #0fda88;
            padding: 30px;
            width: 420px;
            margin: auto;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            margin-bottom: 40px;
        }
        .glow {
            text-shadow: 0 0 10px #0fda88, 0 0 20px #0fda88;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #0fda88;
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
        }
        .btn:hover {
            background: #11ff9a;
        }
        .card{
            border: 1px solid #0fda88;
            width: 300px;
            margin: 0 auto;
            
            padding-right: 30px;    

        }
    </style>
</head>
<body>

<div class="box">
    <h1 class="glow">ACCESS GRANTED</h1>
    <p>Welcome to the DeepWeb panel.</p>
    <p>Your identity has been verified.</p>

    <!-- Button to go to Create Listing page -->
    <a href="/createListingPage" class="btn">Create Listing</a>
</div>
<div class="cards-section">

</div>



<script>

const data = {{ data_json|safe }};

Object.keys(data).forEach(key => {
    const listing = data[key];


    const pictures = []


    for(const picUrl of listing.pictures){

        const newPicUrl = "../.."+picUrl;
       pictures.push(newPicUrl);
    }






    const card = document.createElement('div');
    card.className = 'card';

    const ul = document.createElement('ul');
    
    for (const field of Object.keys(listing)) {
    const value = listing[field];
    const li = document.createElement('li');
    li.innerHTML = `<strong>${field.charAt(0).toUpperCase() + field.slice(1)}</strong>: ${value}`;
    
    ul.appendChild(li);
}
    for(const picUrl of pictures){
        const li = document.createElement('li');
        const img = document.createElement('img');
        img.src = picUrl;
        img.style.maxWidth = '100%';
        img.style.marginTop = '10px';
        li.appendChild(img);
        ul.appendChild(li);
    }

    card.appendChild(ul);
    document.querySelector('.cards-section').appendChild(card);
});

</script>

<button id="sync" >sync</button>
<br>
<label for="all">All</label>
<input type="checkbox" name="all" id="all">
<br>
<label for="aukro">aukro</label>
<input type="checkbox" name="aukro" id="aukro">
<br>
<label for="bazos">bazos</label>
<input type="checkbox" name="bazos" id="bazos">
<br>
<label for="bazos">sbazar</label>
<input type="checkbox" name="sbazar"  id="sbazar">


</div>


</body>
</html>
