<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'deepwebresponsive.css' %}" />
    <link rel="stylesheet" href="{% static 'deepweb.css' %}" />
    <link rel="stylesheet" href="{% static 'deepwebresponsive.css' %}" />
    <link rel="stylesheet" href="{% static 'headerresponsive.css' %}" />
    <link rel="stylesheet" href="{% static 'global.css' %}" />
    <link rel="stylesheet" href="{% static 'deepwebresponsive.css' %}" />
    <link rel="preconnect" href="https://icons.googleapis.com" />
    <link rel="preconnect" href="https://icons.gstatic.com" crossorigin />
    <link
      href="https://icons.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <script src="{% static 'deepweb.js' %}" type="module"></script>
    <script src="{% static 'deepwebresponsive.js' %}" type="module"></script>
    <script src="{% static 'navbar.js' %}" type="module"></script>
  </head>
  <body class="indexBody">
    <header class="header1">
      <div class="navbarD">
        <button class="btnD btnD1">
          <img src="{% static 'icons/Info.svg' %}" alt="" />Guide
        </button>
        <button class="btnD btnD2">
          <img src="{% static 'icons/Stat.svg' %}" alt="" />Statistics
        </button>
        <button class="btnD btnD4">
          <img src="{% static 'icons/Sort list_alt.svg' %}" alt="" />Listings
        </button>
        <button class="btnD btnD3">
          <img src="{% static 'icons/Setting_line.svg' %}" alt="" />Settings
        </button>
      </div>
    </header>

    <main class="main">
      <aside class="optionsD">
        <div class="filtersIntro">
          <p class="filtersEyebrow">Listings workspace</p>
          <h1 class="filtersTitle">Manage listings</h1>
        </div>
        <input type="text" class="searchListing" placeholder="Search" />
<div style="display:none;" id="emailEX"></div>
<div style="display:none;" id="phoneEX"></div>

<script>
const data = {{ config|safe }};

document.getElementById("emailEX").textContent = data.email;
document.getElementById("phoneEX").textContent = data.phone;
</script>
        <div class="subOptions">
          <div class="optionD optionD2">
            <button class="addListingBtn aBtn">
              <img src="{% static 'icons/Chat_plus.svg' %}" alt="" />Add Listing
            </button>
            <button class="removeListingBtn aBtn">
              <img src="{% static './icons/Remove.svg' %}" alt="" />Remove
              Listing
            </button>
          </div>
          <div class="optionD optionD0">
            <h1 class="optionTitleD">Display</h1>
            <p>All<input type="checkbox" id="all" checked /></p>
            <p>Seperate<input type="checkbox" id="seperate" /></p>
            <p>Only Bazoš<input type="checkbox" id="bazosOnly" /></p>
            <p>Only Sbazar<input type="checkbox" id="sbazarOnly" /></p>
            <p>Only Aukro<input type="checkbox" id="aukroOnly" /></p>
          </div>

          <div class="optionD optionD1">
            <h1 class="optionTitleD">Sort By</h1>
            <p>Price (Low to High) <input type="checkbox" id="price1" /></p>
            <p>Price (High to Low)<input type="checkbox" id="price2" /></p>
            <p>Most Recent<input type="checkbox" id="mostRecent" checked /></p>
            <p>Oldest First<input type="checkbox" id="oldestFirst" /></p>
          </div>

          

          
        </div>
      </aside>

      <script></script>

      <section class="listingsDiv">
        <div class="listingSelectionActions hidden">
          <button class="cancelSelectionBtn aBtn">Cancel</button>
          <button class="confirmDeleteBtn aBtn">Delete Selected</button>
        </div>
        <div class="allListings">
          <!-- listings are rendered here--> 
        </div>
      </section>
    </main>
  </body>
</html>
