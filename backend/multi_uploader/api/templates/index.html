<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }
    .container {
      text-align: center;
    }
    .btn {
      padding: 12px 24px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      text-decoration: none;
      display: block;
      margin: 10px auto;
      width: 150px;
    }
    .btn:hover {
      background: #0056c7;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Welcome</h1>
  <a href="/login" class="btn">Login</a>
  <a href="/register" class="btn">Register</a>
</div>

</body>
</html>
