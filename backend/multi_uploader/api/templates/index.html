<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three EXR</title>

  <!-- Import map for Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "/static/three.js-master/build/three.module.js"
    }
  }
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* ===== COMMON ===== */

    .hidden {
      display: none;
    }

    .btn {
      padding: 12px 24px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      text-decoration: none;
      display: block;
      margin: 10px auto;
      width: 150px;
      text-align: center;
    }

    .btn:hover {
      background: #0056c7;
    }

    /* ===== HOME PAGE ===== */

    .container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
      color: white;
    }

    .container * {
      pointer-events: auto;
    }

    /* ===== LOGIN PAGE ===== */

    .login {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 20;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    .login-box h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <!-- ===== PAGE: HOME ===== -->
  <div class="home">
    <div class="container">
      <h1>Welcome</h1>
      <button class="btn" id="login">Login</button>
      <button class="btn" id="register">Register</button>
      <button class="btn" id="rotateBtn">Rotate</button>
    </div>
  </div>

  <!-- ===== PAGE: LOGIN ===== -->
  <div class="login hidden">
    <div class="login-box">
      <h2>Login</h2>
      <form method="POST" action="/login/check/">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button class="btn" type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- ===== THREE.JS SCRIPT ===== -->
  <script type="module" src="/static/script.js"></script>
<style>
  .hidden {
      display: none;
    }


    .login-box.hidden{

      opacity: 0;
    }
.login-box{


  transition: opacity 0.5s ease;
}

</style>
</body>
</html>
